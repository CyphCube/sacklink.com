{{ define "main" }}
<div id="app">

  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <a href="{{ "/" | relURL }}" class="logo-link">
          <img src="{{ "logo.webp" | relURL }}" alt="Sacklink" class="site-logo" />
        </a>
      </div>
      <nav class="main-nav">
        <a class="nav-item" href="{{ "/" | relURL }}">Stablecoins</a>
        <a class="nav-item" href="/cryptocurrencies/">Cryptocurrencies</a>
        <a class="nav-item" href="/rwa/">RWA</a>
        <a class="nav-item active" href="/wallets/">Wallets</a>
      </nav>
      <div class="live-indicator" style="visibility:hidden">
        <span class="live-dot"></span>
        <span class="live-label">Live rates</span>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobile-nav">
      <a class="nav-item" href="{{ "/" | relURL }}">Stablecoins</a>
      <a class="nav-item" href="/cryptocurrencies/">Cryptocurrencies</a>
      <a class="nav-item" href="/rwa/">RWA</a>
      <a class="nav-item active" href="/wallets/">Wallets</a>
    </nav>
  </header>

  <section class="controls" aria-label="Filter controls">
    <div class="filter-row">
      <div class="filter-group chain-filter" role="group" aria-label="Filter by platform">
        <button class="filter-btn active" data-chain="__platform_all__" data-platform="all">All</button>
        <button class="filter-btn platform-btn" data-platform="iOS">
          <span class="platform-btn-logo"><img src="https://api.iconify.design/logos:apple-app-store.svg" alt="iOS" /></span>iOS
        </button>
        <button class="filter-btn platform-btn" data-platform="Android">
          <span class="platform-btn-logo"><img src="https://api.iconify.design/logos:google-play-icon.svg" alt="Android" /></span>Android
        </button>
        <button class="filter-btn platform-btn" data-platform="Extension">
          <span class="platform-btn-logo"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" fill="#4285F4"/><circle cx="12" cy="12" r="6" fill="white"/><circle cx="12" cy="12" r="3.5" fill="#4285F4"/><path d="M12 2a10 10 0 0 1 8.66 5H12a5 5 0 0 0-4.33 2.5L5.34 5.67A10 10 0 0 1 12 2z" fill="#EA4335"/><path d="M22 12a10 10 0 0 1-5 8.66l-3.5-6.06A5 5 0 0 0 17 12z" fill="#FBBC05"/><path d="M12 22a10 10 0 0 1-8.66-5L6.84 14A5 5 0 0 0 12 17z" fill="#34A853"/></svg></span>Extension
        </button>
        <button class="filter-btn platform-btn" data-platform="Desktop">
          <span class="platform-btn-logo"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#60A5FA"><path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h7l-2 3v1h8v-1l-2-3h7c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 12H3V4h18v10z"/></svg></span>Desktop
        </button>
        <button class="filter-btn platform-btn" data-platform="Hardware">
          <span class="platform-btn-logo"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="#F0B90B"><path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></span>Hardware
        </button>
      </div>
      <div class="filter-group chain-filter" role="group" aria-label="Filter by crypto">
        <button class="filter-btn active" data-chain="__crypto_all__" data-crypto="all">All</button>
        <button class="filter-btn platform-btn" data-crypto="BTC">
          <span class="btn-logo" data-chain-logo="BTC"></span>BTC
        </button>
        <button class="filter-btn platform-btn" data-crypto="ETH">
          <span class="btn-logo" data-chain-logo="Ethereum"></span>ETH
        </button>
        <button class="filter-btn platform-btn" data-crypto="SOL">
          <span class="btn-logo" data-chain-logo="Solana"></span>SOL
        </button>
        <button class="filter-btn platform-btn" data-crypto="BNB">
          <span class="btn-logo" data-chain-logo="BSC"></span>BNB
        </button>
        <button class="filter-btn platform-btn" data-crypto="SUI">
          <span class="btn-logo" data-chain-logo="Sui"></span>SUI
        </button>
        <button class="filter-btn platform-btn" data-crypto="HYPE">
          <span class="btn-logo" data-chain-logo="Hyperliquid L1"></span>HYPE
        </button>
        <button class="filter-btn platform-btn" data-crypto="XRP">
          <span class="btn-logo" data-chain-logo="XRPL"></span>XRP
        </button>
        <button class="filter-btn platform-btn" data-crypto="XLM">
          <span class="btn-logo" data-chain-logo="Stellar"></span>XLM
        </button>
      </div>
    </div>
  </section>

  <main class="table-section">
    <div class="table-wrap" role="region" aria-label="Wallets">
      <table id="wallets-table">
        <thead>
          <tr>
            <th class="col-wallet-name sortable sorted" scope="col" data-sort="name">
              Wallet <span class="sort-arrow" aria-hidden="true">↓</span>
            </th>
            <th class="col-platforms" scope="col">Platforms</th>
            <th class="col-tokens" scope="col">Supported Tokens</th>
            <th class="col-mau sortable" scope="col" data-sort="mau">
              Monthly Users <span class="sort-arrow" aria-hidden="true"></span>
            </th>
            <th class="col-opensource" scope="col">Open Source</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="5" class="loading-row">No wallets added yet.</td></tr>
        </tbody>
      </table>
    </div>
    <footer class="table-footer">
      <span id="count-note" class="footer-note"></span>
      <span class="footer-note">Data curated manually</span>
    </footer>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">&copy; {{ now.Year }} Sacklink</span>

    </div>
  </footer>

</div>
<script>
  (function(){
    var btn = document.getElementById('hamburger');
    var nav = document.getElementById('mobile-nav');
    if(!btn||!nav) return;
    btn.addEventListener('click', function(){
      var open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
  })();
</script>
{{ end }}
