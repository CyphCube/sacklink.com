{{ define "main" }}
<div id="app">

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo-block">
        <a href="{{ "/" | relURL }}" class="logo-link">
          <img src="{{ "logo.webp" | relURL }}" alt="Sacklink" class="site-logo" />
        </a>
      </div>
      <nav class="main-nav">
        <a class="nav-item" href="{{ "/" | relURL }}">Stablecoins</a>
        <a class="nav-item active" href="/cryptocurrencies/">Cryptocurrencies</a>
        <a class="nav-item" href="/rwa/">RWA</a>
        <a class="nav-item" href="/wallets/">Wallets</a>
        <a class="nav-item" href="/blog/">Blog</a>
      </nav>
      <div class="live-indicator">
        <span class="live-dot" aria-hidden="true"></span>
        <span class="live-label">Live rates</span>
      </div>
      <button class="hamburger" id="hamburger" aria-label="Menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
    <nav class="mobile-nav" id="mobile-nav">
      <a class="nav-item" href="{{ "/" | relURL }}">Stablecoins</a>
      <a class="nav-item active" href="/cryptocurrencies/">Cryptocurrencies</a>
      <a class="nav-item" href="/rwa/">RWA</a>
      <a class="nav-item" href="/wallets/">Wallets</a>
      <a class="nav-item" href="/blog/">Blog</a>
    </nav>
  </header>

  <!-- Metrics Bar -->
  <section class="metrics-bar" aria-label="Summary statistics">
    <div class="metric-card">
      <div class="metric-label">Avg APY</div>
      <div class="metric-value green" id="stat-avg-apy">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Total TVL</div>
      <div class="metric-value" id="stat-tvl">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Best APY</div>
      <div class="metric-value green" id="stat-best">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Markets</div>
      <div class="metric-value" id="stat-count">—</div>
    </div>
  </section>

  <!-- Controls -->
  <section class="controls" aria-label="Filter and sort controls">
    <div class="filter-row">

      <!-- Token Filter -->
      <div class="filter-group token-filter" role="group" aria-label="Filter by token">
        <button class="filter-btn active" data-token="all">All</button>
        <button class="filter-btn" data-token="ETH">ETH</button>
        <button class="filter-btn" data-token="SOL">SOL</button>
        <button class="filter-btn" data-token="SUI">SUI</button>
        <button class="filter-btn" data-token="HYPE">HYPE</button>
      </div>

      <div class="spacer"></div>

      <!-- Sort -->
      <select class="sort-select" id="sort-select" aria-label="Sort markets">
        <option value="apy">Highest APY</option>
        <option value="tvl">Highest TVL</option>
        <option value="risk">Lowest Risk</option>
        <option value="7d">7d Change</option>
      </select>
    </div>
  </section>

  <!-- Table -->
  <main class="table-section">
    <div class="table-wrap" role="region" aria-label="Yield markets">
      <table id="markets-table" aria-live="polite">
        <thead>
          <tr>
            <th class="col-protocol sortable" scope="col" data-sort="protocol">
              Protocol <span class="sort-arrow" aria-hidden="true"></span>
            </th>
            <th class="col-chain" scope="col">Chain</th>
            <th class="col-token" scope="col">Token</th>
            <th class="col-apy sortable sorted" scope="col" data-sort="apy">
              APY <span class="sort-arrow" aria-hidden="true">↓</span>
            </th>
            <th class="col-tvl sortable" scope="col" data-sort="tvl">
              TVL <span class="sort-arrow" aria-hidden="true"></span>
            </th>
            <th class="col-7d sortable" scope="col" data-sort="7d">
              7d Δ <span class="sort-arrow" aria-hidden="true"></span>
            </th>
            <th class="col-risk sortable" scope="col" data-sort="risk">
              Risk <span class="sort-arrow" aria-hidden="true"></span>
            </th>
          </tr>
        </thead>
        <tbody id="tbody">
          <tr><td colspan="7" class="loading-row">Loading markets…</td></tr>
        </tbody>
      </table>
    </div>

    <footer class="table-footer">
      <span id="count-note" class="footer-note"></span>
      <span class="footer-note">Auto-refreshes every 60s &middot; Data via <a href="https://defillama.com" target="_blank" rel="noopener" style="color:var(--text-secondary);text-decoration:underline">DefiLlama</a></span>
    </footer>
  </main>

</div>

<script>
  (function(){
    var btn = document.getElementById('hamburger');
    var nav = document.getElementById('mobile-nav');
    if(!btn||!nav) return;
    btn.addEventListener('click', function(){
      var open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open);
    });
  })();
</script>
{{ end }}
