<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ .Site.Title }} — {{ .Site.Params.tagline }}</title>
  <meta name="description" content="{{ .Site.Params.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ "apple-touch-icon.png" | relURL }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}" />
  <link rel="icon" type="image/png" sizes="16x16" href="{{ "favicon-16x16.png" | relURL }}" />
  <link rel="manifest" href="{{ "site.webmanifest" | relURL }}" />
  <link rel="shortcut icon" href="{{ "favicon.ico" | relURL }}" />
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}" />
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-PV0WQNSPWN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-PV0WQNSPWN');
  </script>
</head>
<body>
  {{ block "main" . }}{{ end }}
  <script src="{{ "js/risk.js" | relURL }}"></script>
  <script src="{{ "js/chains.js" | relURL }}"></script>
  {{ if hasPrefix .RelPermalink "/cryptocurrencies" }}
  <script src="{{ "js/crypto-data.js" | relURL }}"></script>
  <script src="{{ "js/crypto-app.js" | relURL }}"></script>
  {{ else if hasPrefix .RelPermalink "/rwa" }}
  <script src="{{ "js/rwa-data.js" | relURL }}"></script>
  <script src="{{ "js/rwa-app.js" | relURL }}"></script>
  {{ else if hasPrefix .RelPermalink "/wallets" }}
  <script src="{{ "js/wallets-data.js" | relURL }}"></script>
  <script src="{{ "js/wallets-app.js" | relURL }}"></script>
  {{ else }}
  <script src="{{ "js/data.js" | relURL }}"></script>
  <script src="{{ "js/app.js" | relURL }}"></script>
  {{ end }}
</body>
</html>
