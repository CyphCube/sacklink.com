<svg width="100%" viewBox="0 0 680 390" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Hot wallet vs hardware wallet: private key security comparison</title>
<desc>Left side shows a hot wallet with private keys exposed on an internet-connected device. Right side shows a hardware wallet where keys are sealed inside the device and never accessible to the companion app.</desc>

<defs>
  <marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1fc87a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="390" fill="#0d0f14"/>
<rect x="0" y="0" width="340" height="390" fill="#f5a623" fill-opacity="0.025"/>
<rect x="340" y="0" width="340" height="390" fill="#1fc87a" fill-opacity="0.028"/>
<line x1="340" y1="44" x2="340" y2="330" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1" stroke-dasharray="5 5"/>

<text x="170" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="10.5" fill="#f5a623" letter-spacing="0.13em">HOT WALLET</text>
<rect x="128" y="80" width="84" height="144" rx="10" fill="#13161e" stroke="#f5a623" stroke-width="0.8" stroke-opacity="0.32"/>
<rect x="152" y="86" width="36" height="5" rx="2.5" fill="#f5a623" fill-opacity="0.18"/>
<rect x="157" y="217" width="26" height="3" rx="1.5" fill="#f5a623" fill-opacity="0.18"/>

<circle cx="160" cy="160" r="13" fill="none" stroke="#f5a623" stroke-width="2.2"/>
<circle cx="160" cy="160" r="6.5" fill="#0d0f14"/>
<rect x="160" y="156" width="36" height="7" rx="1.5" fill="#f5a623"/>
<rect x="183" y="163" width="5" height="10" rx="1.2" fill="#f5a623"/>
<rect x="173" y="163" width="5" height="7.5" rx="1.2" fill="#f5a623"/>

<circle cx="172" cy="160" r="29" fill="none" stroke="#f5a623" stroke-width="0.6" stroke-opacity="0.32" stroke-dasharray="4 5"/>
<circle cx="172" cy="160" r="44" fill="none" stroke="#f5a623" stroke-width="0.5" stroke-opacity="0.16" stroke-dasharray="4 5"/>
<circle cx="172" cy="160" r="59" fill="none" stroke="#f5a623" stroke-width="0.4" stroke-opacity="0.08" stroke-dasharray="4 5"/>

<text x="170" y="254" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#7a8099">Key stored on device</text>
<text x="170" y="271" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#f5a623" fill-opacity="0.65">Internet connected</text>

<text x="510" y="62" text-anchor="middle" font-family="'Courier New',monospace" font-size="10.5" fill="#1fc87a" letter-spacing="0.13em">HARDWARE WALLET</text>
<rect x="388" y="100" width="60" height="100" rx="7" fill="#13161e" stroke="#1fc87a" stroke-width="0.8" stroke-opacity="0.28"/>
<rect x="408" y="107" width="20" height="4" rx="2" fill="#1fc87a" fill-opacity="0.14"/>
<rect x="396" y="120" width="44" height="3" rx="1" fill="#7a8099" fill-opacity="0.28"/>
<rect x="396" y="130" width="30" height="3" rx="1" fill="#7a8099" fill-opacity="0.2"/>
<rect x="396" y="140" width="44" height="3" rx="1" fill="#7a8099" fill-opacity="0.28"/>
<rect x="396" y="152" width="44" height="17" rx="3" fill="#1fc87a" fill-opacity="0.1" stroke="#1fc87a" stroke-width="0.6" stroke-opacity="0.3"/>
<text x="418" y="164" text-anchor="middle" font-family="'Courier New',monospace" font-size="8" fill="#1fc87a" fill-opacity="0.65">CONFIRM →</text>
<rect x="405" y="192" width="22" height="3" rx="1.5" fill="#1fc87a" fill-opacity="0.14"/>

<line x1="450" y1="150" x2="467" y2="150" stroke="#1fc87a" stroke-width="1" stroke-opacity="0.38" stroke-dasharray="3 3" marker-end="url(#ag)"/>

<rect x="469" y="112" width="78" height="76" rx="8" fill="#1a1e28" stroke="#1fc87a" stroke-width="1.4" stroke-opacity="0.72"/>
<rect x="547" y="130" width="16" height="36" rx="2.5" fill="#0d0f14" stroke="#1fc87a" stroke-width="0.8" stroke-opacity="0.38"/>
<circle cx="481" cy="124" r="3" fill="#1fc87a" fill-opacity="0.65"/>
<circle cx="491" cy="124" r="3" fill="#1fc87a" fill-opacity="0.25"/>

<rect x="491" y="140" width="34" height="28" rx="4" fill="#1fc87a" fill-opacity="0.1" stroke="#1fc87a" stroke-width="1.4" stroke-opacity="0.75"/>
<path d="M497 140 L497 132 A11 10 0 0 1 519 132 L519 140" fill="none" stroke="#1fc87a" stroke-width="1.6" stroke-linecap="round"/>
<circle cx="508" cy="153" r="4.5" fill="#1fc87a" fill-opacity="0.3" stroke="#1fc87a" stroke-width="1.2"/>
<rect x="506.5" y="154.5" width="3" height="7" rx="1.2" fill="#1fc87a" fill-opacity="0.55"/>

<text x="510" y="254" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#7a8099">Key sealed in hardware</text>
<text x="510" y="271" text-anchor="middle" font-family="'Courier New',monospace" font-size="10" fill="#1fc87a" fill-opacity="0.65">Never leaves the device</text>

<line x1="72" y1="304" x2="608" y2="304" stroke="#ffffff" stroke-opacity="0.055" stroke-width="1"/>
<text x="340" y="331" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="15" font-weight="600" fill="#e8eaf0">At no point do private keys leave the device.</text>
<text x="340" y="357" text-anchor="middle" font-family="'Courier New',monospace" font-size="9.5" fill="#4a5068" letter-spacing="0.1em">SACKLINK.COM</text>
</svg>
